site_name: Kanama
site_description: Kotlin GDExtension for Godot via Project Panama (FFM)
site_url: https://falcon4ever.github.io/kanama/
repo_name: falcon4ever/kanama
repo_url: https://github.com/falcon4ever/kanama
theme:
  name: material
  logo: assets/kanama-logo.png
  favicon: assets/kanama-logo.png
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - tables
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true
extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
nav:
  - Home: index.md
  - Getting Started:
      - Introduction: getting-started/index.md
      - Use a Release Kit: getting-started/release-kit.md
      - Use a Store Addon: getting-started/store-addon.md
      - Use a Source Checkout: getting-started/source-checkout.md
      - Work on Kanama: getting-started/work-on-kanama.md
      - The Editor Loop: getting-started/editor-workflow.md
  - Game Development:
      - Writing Kotlin Scripts: game-dev/scripts.md
      - Calling Godot APIs: game-dev/godot-api.md
      - Exports and Resources: game-dev/properties-resources.md
      - Signals and Callbacks: game-dev/signals.md
      - Multiplayer: game-dev/multiplayer.md
      - Porting GDScript: game-dev/porting-gdscript.md
      - Kotlin Style: game-dev/style-guide.md
  - Exporting:
      - Desktop and Packaging: exporting/desktop.md
      - Android Experimental: exporting/android.md
      - iOS Experimental: exporting/ios.md
  - Reference:
      - Version Support: reference/version-support.md
      - C# Comparison: reference/c-sharp-compat.md
  - Contributing:
      - Contributor Guide: contributing/index.md
      - Architecture: contributing/architecture.md
      - Wrapper Maintenance: contributing/wrapper-maintenance.md
      - API Coverage: contributing/api-coverage.md
      - Wrapper Generator Report: contributing/wrapper-generator-report.md
      - Hot Reload Internals: contributing/hot-reload-internals.md
      - Demo Porting Rules: contributing/demo-porting-rules.md
      - Android Internals: contributing/android-internals.md
  - Internals:
      - Index: internals/README.md
      - Active:
          - iOS Backend Roadmap: internals/active/ios-backend-roadmap.md
          - iOS Demo Port Tracker: internals/active/ios-demo-port-tracker.md
          - Wrapper Coverage Tracker: internals/active/wrapper-coverage-tracker.md
      - Reference:
          - iOS Backend Architecture: internals/reference/ios-backend-architecture.md
          - iOS Backend Hand-written Registry: internals/reference/ios-backend-handwritten.md
          - Architecture Review (2026-06): internals/reference/architecture-review-2026-06.md
          - commonMain Wrapper Unification Design (4.3): internals/reference/commonmain-unification-design.md
          - Wrapper Coverage Roadmap: internals/reference/wrapper-coverage-roadmap.md
      - Historical:
          - Callable Args Design (1.4): internals/historical/callable-args-design.md
          - Script Model Unification Design (3.1): internals/historical/script-model-unification-design.md
          - Virtual Method Coverage Design (5.1): internals/historical/virtual-method-coverage-design.md
