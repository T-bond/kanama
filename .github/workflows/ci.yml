name: ci

# Pull-request merge gate. Runs the same local_ci.sh gate a maintainer runs by
# hand, so a contributor's "smoke passes" claim is never load-bearing — CI decides.
#
# Free on GitHub-hosted standard runners for public repos. Fork PRs run with a
# read-only token and no secret access (pull_request, not pull_request_target);
# keep the repo setting "Require approval for first-time contributors" enabled so
# an outside PR's first run needs a maintainer click.
on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Dash form of kanamaGodotVersion in gradle.properties (the single-source pin, F4).
  GODOT_VERSION: 4.7-stable

jobs:
  gate:
    name: local-ci (linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Install CLI dependencies
        shell: bash
        run: |
          # local_ci.sh and the smoke scripts shell out to ripgrep (`rg`), which
          # is not preinstalled on ubuntu-24.04 runners.
          sudo apt-get update -qq
          sudo apt-get install -y -qq ripgrep

      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: ~/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Download Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$HOME/godot"
          godot_zip="$(mktemp)"
          curl -fL -o "$godot_zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "$godot_zip" -d "$HOME/godot"
          rm -f "$godot_zip"

      - name: Run local CI gate
        shell: bash
        run: |
          godot_bin="$HOME/godot/Godot_v${GODOT_VERSION}_linux.x86_64"
          chmod +x "$godot_bin"
          # --skip-docs: mkdocs strict runs in the dedicated `docs` job below.
          # The native bootstrap build (CMake + gcc, preinstalled on ubuntu) is
          # kept in for parity; add --skip-bootstrap for faster PR turnaround.
          scripts/local_ci.sh --skip-docs "$godot_bin"

  docs:
    name: docs (mkdocs strict)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install docs dependencies
        run: pip install -r docs/requirements.txt

      - name: Build docs (strict)
        run: mkdocs build --strict

  # --- Mobile build lanes: build-only, no emulator / simulator / device ---
  # Gated on `changes.mobile` so PRs that can't affect a mobile build (docs,
  # unrelated scripts, example project) skip these jobs entirely. Job-level `if`
  # skips report a "skipped" conclusion, which satisfies required status checks —
  # so these stay safe to require in branch protection later.
  changes:
    name: detect changes
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect mobile-relevant changes
        id: filter
        shell: bash
        run: |
          # Non-PR events (push to main) always build the mobile lanes.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "mobile=true" >> "$GITHUB_OUTPUT"
            echo "non-PR event -> building mobile lanes"
            exit 0
          fi
          changed="$(git diff --name-only '${{ github.event.pull_request.base.sha }}'...HEAD)"
          echo "changed files:"; echo "$changed"
          # `ios/` (the C shim + headers) and `gdextension/` (the bundled interface header the shim
          # includes) must trigger the mobile lanes — a change to `ios/bootstrap/kanama_ios_shim.c`
          # otherwise skipped the iOS xcframework build (only `ios-runtime/` was matched).
          if printf '%s\n' "$changed" | grep -qE '^(src/|processor/|annotations/|ios/|ios-runtime/|gdextension/|android/|gradle/|build\.gradle\.kts|settings\.gradle\.kts|gradle\.properties|\.github/workflows/ci\.yml)'; then
            echo "mobile=true" >> "$GITHUB_OUTPUT"
          else
            echo "mobile=false" >> "$GITHUB_OUTPUT"
          fi

  # The GDExtension header is platform-independent; dump it once here and share
  # it (matches package.yml). The iOS C shim needs it to compile; the Android
  # Kotlin build gets it as harmless insurance.
  gdextension-header:
    name: gdextension-header
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Dump GDExtension header
        shell: bash
        run: |
          tmp_dir="$(mktemp -d)"
          godot_zip="$tmp_dir/godot.zip"
          godot_bin="$tmp_dir/Godot_v${GODOT_VERSION}_linux.x86_64"
          curl -fL -o "$godot_zip" \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}/Godot_v${GODOT_VERSION}_linux.x86_64.zip"
          unzip -q "$godot_zip" -d "$tmp_dir"
          ( cd "$tmp_dir" && "$godot_bin" --headless --log-file "$tmp_dir/gd.log" --dump-gdextension-interface )
          mkdir -p gdextension
          cp "$tmp_dir/gdextension_interface.h" gdextension/gdextension_interface.h

      - name: Upload GDExtension header
        uses: actions/upload-artifact@v6
        with:
          name: kanama-gdextension-interface
          path: gdextension/gdextension_interface.h
          if-no-files-found: error

  android:
    name: android (aar build)
    needs: [changes, gdextension-header]
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Download GDExtension header
        uses: actions/download-artifact@v7
        with:
          name: kanama-gdextension-interface
          path: gdextension

      - name: Build Android runtime AAR
        shell: bash
        # assembleDebug catches Android build breakage against the PanamaPort
        # fork (ANDROID_HOME is preset on the runner). R8 minification runs at
        # APK-export time, which is a heavier, separate follow-on.
        run: ./gradlew assembleAndroidPluginAar

  ios:
    name: ios (xcframework build)
    needs: [changes, gdextension-header]
    if: needs.changes.outputs.mobile == 'true'
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Cache Kotlin/Native toolchain
        uses: actions/cache@v4
        with:
          # The konan LLVM/sysroot/libffi deps re-download each run otherwise;
          # keyed on the gradle build files so a Kotlin version bump busts it.
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/**', '**/*.gradle.kts', 'gradle.properties') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Download GDExtension header
        uses: actions/download-artifact@v7
        with:
          name: kanama-gdextension-interface
          path: gdextension

      - name: Build iOS device xcframework
        shell: bash
        # PRs build the debug device xcframework only (~half the compile, which
        # is the dominant cost); the release xcframework is validated on push to
        # main. Static libs, so no code signing is needed either way.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ./gradlew createIosDeviceDebugXcframework
          else
            ./gradlew assembleIosDeviceKanamaXcframework
          fi
