name: smoke

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  phase6-and-hotreload:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Set up CMake
        uses: lukka/get-cmake@latest

      - name: Build bootstrap shared library
        run: |
          cmake -S bootstrap -B bootstrap/build -DCMAKE_BUILD_TYPE=Release
          cmake --build bootstrap/build --config Release

      - name: Install bootstrap library into example addon
        run: |
          cp bootstrap/build/libkanama_bootstrap.so example_project/addons/kanama/libkanama_bootstrap.so

      - name: Build and sync Kanama jars
        run: ./gradlew syncExampleAddonJar

      - name: Download Godot 4.6.2 binary
        id: godot
        env:
          GODOT_VERSION: "4.6.2"
        run: |
          url="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fL "$url" -o /tmp/godot.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          bin="$(find /tmp/godot -type f -name 'Godot*_linux.x86_64' | head -n 1)"
          chmod +x "$bin"
          echo "bin=$bin" >> "$GITHUB_OUTPUT"

      - name: Run Phase 6 smoke
        run: scripts/phase6_smoke.sh "${{ steps.godot.outputs.bin }}"

      - name: Run Hot Reload smoke
        run: scripts/hot_reload_smoke.sh "${{ steps.godot.outputs.bin }}"
